server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hardening básico
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compressão
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml font/woff2;

    # Roteamento limpo: /rockinrio -> /rockinrio/index.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 404 customizado
    error_page 404 /404.html;
    location = /404.html { internal; }

    # Calendário (.ics) servido como text/calendar — faz o iPhone abrir direto no app Calendário
    location ~* \.ics$ {
        default_type text/calendar;
        add_header Cache-Control "public, max-age=300";
    }

    # Cache de assets estáticos
    location ~* \.(?:css|js|png|jpe?g|gif|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
